<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Blue to purple gradient for "GJS" -->
    <linearGradient id="gjsGrad" x1="60" y1="0" x2="620" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="55%"  stop-color="#5E35B1"/>
      <stop offset="100%" stop-color="#7B1FA2"/>
    </linearGradient>

    <!-- Purple to teal gradient for "ify" -->
    <linearGradient id="ifyGrad" x1="605" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#8E24AA"/>
      <stop offset="50%"  stop-color="#5E35B1"/>
      <stop offset="100%" stop-color="#00ACC1"/>
    </linearGradient>

    <!-- Soft glow filter for splatters -->
    <filter id="splatterGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="1000" height="1000" fill="white"/>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Wavy decorative lines — left side (blue)   -->
  <!-- ═══════════════════════════════════════════ -->
  <g stroke="#1976D2" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.80">
    <path d="M 125,455 C 162,432 162,402 125,378"/>
    <path d="M 108,500 C 145,477 145,447 108,423"/>
    <path d="M 143,508 C 180,485 180,455 143,431"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- Wavy decorative lines — right side (teal)   -->
  <!-- ════════════════════════════════════════════ -->
  <g stroke="#00ACC1" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.80">
    <path d="M 873,450 C 910,427 910,397 873,373"/>
    <path d="M 888,495 C 925,472 925,442 888,418"/>
    <path d="M 858,505 C 895,482 895,452 858,428"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- Blue paint splatter — upper left            -->
  <!-- ════════════════════════════════════════════ -->
  <g fill="#1976D2" filter="url(#splatterGlow)">
    <!-- Main blob -->
    <path d="M 120,185 C 130,172 148,170 155,180 C 162,190 158,205 148,210
             C 138,215 120,210 113,200 C 106,190 110,198 120,185 Z"/>
    <!-- Satellite droplets -->
    <circle cx="80"  cy="168" r="6.5"/>
    <circle cx="162" cy="160" r="5.5"/>
    <circle cx="72"  cy="200" r="4.5"/>
    <circle cx="168" cy="218" r="4.0"/>
    <circle cx="95"  cy="148" r="3.5"/>
    <circle cx="148" cy="232" r="3.0"/>
    <circle cx="63"  cy="183" r="2.5"/>
    <circle cx="175" cy="185" r="2.5"/>
    <circle cx="105" cy="240" r="2.0"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- Purple paint splatter — lower left (small)  -->
  <!-- ════════════════════════════════════════════ -->
  <g fill="#9C27B0" filter="url(#splatterGlow)">
    <path d="M 158,648 C 165,638 178,637 183,645 C 188,653 183,665 173,668
             C 163,671 150,664 148,655 C 146,646 151,658 158,648 Z"/>
    <circle cx="130" cy="636" r="5.0"/>
    <circle cx="188" cy="638" r="4.0"/>
    <circle cx="140" cy="672" r="3.5"/>
    <circle cx="177" cy="674" r="3.0"/>
    <circle cx="120" cy="655" r="2.5"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- Teal paint splatter — upper right           -->
  <!-- ════════════════════════════════════════════ -->
  <g fill="#00BCD4" filter="url(#splatterGlow)">
    <!-- Main blob -->
    <path d="M 835,193 C 845,180 863,178 870,188 C 877,198 872,214 861,219
             C 850,224 832,218 826,207 C 820,196 825,206 835,193 Z"/>
    <!-- Satellite droplets -->
    <circle cx="800" cy="176" r="6.0"/>
    <circle cx="876" cy="168" r="5.5"/>
    <circle cx="793" cy="210" r="4.5"/>
    <circle cx="882" cy="226" r="4.0"/>
    <circle cx="816" cy="155" r="3.5"/>
    <circle cx="860" cy="240" r="3.0"/>
    <circle cx="790" cy="192" r="2.5"/>
  </g>

  <!-- ════════════════════════════════════════════ -->
  <!-- "GJS" — bold comic text, blue→purple        -->
  <!-- ════════════════════════════════════════════ -->
  <text
    x="62"
    y="580"
    font-family="'Arial Black', 'Impact', 'Haettenschweiler', 'Franklin Gothic Heavy', sans-serif"
    font-weight="900"
    font-size="310"
    fill="url(#gjsGrad)"
    stroke="#000000"
    stroke-width="18"
    stroke-linejoin="round"
    paint-order="stroke fill"
    letter-spacing="-4"
  >GJS</text>

  <!-- ════════════════════════════════════════════ -->
  <!-- "ify" — cursive italic text, purple→teal    -->
  <!-- ════════════════════════════════════════════ -->
  <text
    x="608"
    y="562"
    font-family="'Brush Script MT', 'Segoe Script', 'Apple Chancery', 'URW Chancery L', cursive"
    font-style="italic"
    font-size="265"
    fill="url(#ifyGrad)"
    stroke="#000000"
    stroke-width="11"
    stroke-linejoin="round"
    paint-order="stroke fill"
  >ify</text>
</svg>
