name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils gjs glib2-devel gobject-introspection-devel gtk4-devel libsoup3-devel libepoxy-devel gdk-pixbuf2-devel libadwaita-devel blueprint-compiler meson vala gcc pkgconf

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # Phase D.7d: Node-free install via the committed GJS bundle.
      # Mirrors main.yml — see that workflow for rationale.
      - name: Install dependencies (gjsify install --immutable)
        run: gjs -m packages/infra/cli/dist/cli.gjs.mjs install --immutable

      - name: Build documentation site
        run: gjsify run docs:build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
