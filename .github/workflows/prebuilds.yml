name: Build Native Prebuilds

# Run on push to main and on tags, or manually.
# Artifacts are uploaded and can be downloaded to commit into the repo before npm publish.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/framework/webgl/src/vala/**'
      - 'packages/framework/webgl/src/vapi/**'
      - 'packages/framework/webgl/meson.build'
      - 'packages/web/webrtc-native/src/vala/**'
      - 'packages/web/webrtc-native/meson.build'
      - 'packages/node/http-soup-bridge/src/vala/**'
      - 'packages/node/http-soup-bridge/meson.build'
      - 'packages/node/http2-native/src/vala/**'
      - 'packages/node/http2-native/meson.build'
      - 'packages/infra/lightningcss-native/src/**'
      - 'packages/infra/lightningcss-native/meson.build'
      - 'packages/infra/rolldown-native/src/**'
      - 'packages/infra/rolldown-native/meson.build'
      - '.github/workflows/prebuilds.yml'



jobs:
  # ----------------------------------------------------------------
  # Native runners — x86_64 and aarch64
  # ----------------------------------------------------------------
  build-prebuilds:
    name: Build prebuilds (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:43

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install prerequisites
        # gstreamer*-devel packages provide the .pc files for gstreamer-sdp-1.0
        # and gstreamer-webrtc-1.0 that @gjsify/webrtc-native needs at Vala build time.
        # libsoup3-devel is needed by @gjsify/http-soup-bridge for libsoup-3.0.
        # libnghttp2-devel is needed by @gjsify/http2-native for the HPACK / frame
        # encoder shim wrapping nghttp2.
        # `curl` is needed by rustup-init below.
        run: >
          dnf install -y
          git tar xz findutils curl
          meson vala gcc pkgconf
          glib2-devel gobject-introspection-devel
          gtk4-devel gdk-pixbuf2-devel
          libepoxy-devel
          gstreamer1-devel
          gstreamer1-plugins-base-devel
          gstreamer1-plugins-bad-free-devel
          libsoup3-devel
          libnghttp2-devel

      - name: Install Rust toolchain (rustup, stable)
        # Fedora 43's `dnf install cargo` ships rustc ~1.79 — too old for
        # the lightningcss/rolldown crate trees that pull `indexmap@2.14`
        # which requires `edition2024` (rustc ≥ 1.85). Install rustup
        # directly for a current toolchain.
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Checkout repository
        uses: actions/checkout@v6

      # -------- @gjsify/webgl (gwebgl) --------
      - name: Build @gjsify/webgl Vala library
        working-directory: packages/framework/webgl
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/webgl prebuilds
        working-directory: packages/framework/webgl
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgwebgl.so build/Gwebgl-0.1.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/webgl prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/webgl prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-prebuilds-linux-${{ matrix.arch }}
          path: packages/framework/webgl/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/webrtc-native (GjsifyWebrtc) --------
      - name: Build @gjsify/webrtc-native Vala library
        working-directory: packages/web/webrtc-native
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/webrtc-native prebuilds
        working-directory: packages/web/webrtc-native
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifywebrtc.so build/GjsifyWebrtc-0.1.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/webrtc-native prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/webrtc-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/web/webrtc-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/http-soup-bridge (GjsifyHttpSoupBridge) --------
      - name: Build @gjsify/http-soup-bridge Vala library
        working-directory: packages/node/http-soup-bridge
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/http-soup-bridge prebuilds
        working-directory: packages/node/http-soup-bridge
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifyhttpsoupbridge.so build/GjsifyHttpSoupBridge-1.0.gir build/GjsifyHttpSoupBridge-1.0.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/http-soup-bridge prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/http-soup-bridge prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http-soup-bridge/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/http2-native (GjsifyHttp2) --------
      - name: Build @gjsify/http2-native Vala library
        working-directory: packages/node/http2-native
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/http2-native prebuilds
        working-directory: packages/node/http2-native
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifyhttp2.so build/GjsifyHttp2-1.0.gir build/GjsifyHttp2-1.0.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/http2-native prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/http2-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http2-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http2-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/lightningcss-native (GjsifyLightningcss) --------
      # Pure Rust + Vala; depends on `lightningcss = "1"` from crates.io,
      # no submodule needed. cargo first downloads + compiles the crate
      # graph (~7 min cold on a fresh runner), then meson links the Vala
      # bridge against the resulting cdylib.
      - name: Build @gjsify/lightningcss-native (Rust cdylib + Vala bridge)
        working-directory: packages/infra/lightningcss-native
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/lightningcss-native prebuilds
        working-directory: packages/infra/lightningcss-native
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifylightningcss.so build/libgjsify_lightningcss.so build/GjsifyLightningcss-1.0.gir build/GjsifyLightningcss-1.0.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/lightningcss-native prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/lightningcss-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/infra/lightningcss-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/rolldown-native (GjsifyRolldown) --------
      # Heavier than lightningcss-native: depends on the `refs/rolldown`
      # submodule (rolldown 0.1.0 on crates.io has broken transitive
      # deps — see packages/infra/rolldown-native/src/rust/Cargo.toml).
      # cold cargo build is ~5 min CPU on x86_64. Submodule init alone
      # downloads several hundred MB.
      - name: Init refs/rolldown submodule (rolldown-native source dep)
        run: git submodule update --init --recursive refs/rolldown

      - name: Build @gjsify/rolldown-native (Rust cdylib + Vala bridge)
        working-directory: packages/infra/rolldown-native
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/rolldown-native prebuilds
        working-directory: packages/infra/rolldown-native
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifyrolldown.so build/libgjsify_rolldown.so build/GjsifyRolldown-1.0.gir build/GjsifyRolldown-1.0.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/rolldown-native prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/rolldown-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: rolldown-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/infra/rolldown-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

  # ----------------------------------------------------------------
  # QEMU-emulated builds — ppc64, s390x, riscv64
  #
  # All three run on ubuntu-latest host runners using QEMU binary
  # format emulation via uraimo/run-on-arch-action.
  #
  # ppc64 + s390x: fedora:43 has official images for both → same dnf
  #   package names as the native job above.
  # riscv64: fedora:43 has no riscv64 image → ubuntu:24.04 is used
  #   instead (package names differ; auto-detected via command -v dnf).
  #
  # Node.js process.arch values used as the prebuilds/ dir suffix:
  #   ppc64le (QEMU) → process.arch 'ppc64'  → prebuilds/linux-ppc64/
  #   s390x          → process.arch 's390x'  → prebuilds/linux-s390x/
  #   riscv64        → process.arch 'riscv64'→ prebuilds/linux-riscv64/
  # ----------------------------------------------------------------
  build-prebuilds-qemu:
    name: Build prebuilds (${{ matrix.arch }}) [QEMU]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # IBM POWER9/10 workstations and servers (e.g. Raptor Computing Talos II)
          - arch: ppc64
            qemu_arch: ppc64le
            base_image: fedora:43

          # IBM Z mainframes — enterprise Linux servers
          - arch: s390x
            qemu_arch: s390x
            base_image: fedora:43

          # RISC-V boards (StarFive VisionFive 2, Milk-V Pioneer, SiFive HiFive, …)
          # ubuntu:26.04 is used because fedora:43 has no official riscv64 image.
          - arch: riscv64
            qemu_arch: riscv64
            base_image: ubuntu:26.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build all prebuilds on ${{ matrix.arch }} via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.qemu_arch }}
          distro: none
          base_image: ${{ matrix.base_image }}
          githubToken: ${{ github.token }}

          # Detect package manager: dnf for Fedora (ppc64/s390x), apt-get for Ubuntu (riscv64).
          # `curl` is needed for rustup-init below; `cargo` is the distro
          # package — usually too old for the lightningcss-native build
          # (needs rustc ≥ 1.85 for indexmap@2.14's edition2024). We
          # install rustup separately in `run:`.
          install: |
            if command -v dnf > /dev/null 2>&1; then
              dnf install -y \
                git tar xz findutils curl \
                meson vala gcc pkgconf \
                glib2-devel gobject-introspection-devel \
                gtk4-devel gdk-pixbuf2-devel \
                libepoxy-devel \
                gstreamer1-devel \
                gstreamer1-plugins-base-devel \
                gstreamer1-plugins-bad-free-devel \
                libsoup3-devel \
                libnghttp2-devel
            else
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                git tar xz-utils findutils curl \
                meson valac gcc pkg-config \
                libglib2.0-dev gobject-introspection libgirepository1.0-dev \
                libgtk-4-dev libgdk-pixbuf-2.0-dev \
                libepoxy-dev \
                libgstreamer1.0-dev \
                libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-bad1.0-dev \
                libsoup-3.0-dev \
                libnghttp2-dev
            fi

          run: |
            set -e
            ARCH="${{ matrix.arch }}"

            # rustup install (used by lightningcss-native further down)
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            export PATH="$HOME/.cargo/bin:$PATH"

            # -------- @gjsify/webgl --------
            cd packages/framework/webgl
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgwebgl.so build/Gwebgl-0.1.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/webgl prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/webrtc-native --------
            cd packages/web/webrtc-native
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifywebrtc.so build/GjsifyWebrtc-0.1.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/webrtc-native prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/http-soup-bridge --------
            cd packages/node/http-soup-bridge
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifyhttpsoupbridge.so build/GjsifyHttpSoupBridge-1.0.gir build/GjsifyHttpSoupBridge-1.0.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/http-soup-bridge prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/http2-native --------
            cd packages/node/http2-native
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifyhttp2.so build/GjsifyHttp2-1.0.gir build/GjsifyHttp2-1.0.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/http2-native prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/lightningcss-native --------
            # Pure crates.io deps (no submodule). Cargo download + compile
            # under QEMU is the slow step here — single-arch cold build
            # takes ~20-30 min on emulated ppc64/s390x/riscv64. Worth it:
            # this is exactly the path that lets `gjsify build` run on
            # exotic-arch GJS hosts without the WASM fallback's overhead.
            cd packages/infra/lightningcss-native
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifylightningcss.so build/libgjsify_lightningcss.so build/GjsifyLightningcss-1.0.gir build/GjsifyLightningcss-1.0.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/lightningcss-native prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"

            # NOTE: @gjsify/rolldown-native is intentionally NOT built in
            # the QEMU matrix. The rolldown crate graph (tokio + oxc + ~250
            # transitive crates) compiles in ~5 min on native x86_64; under
            # QEMU emulation that easily blows the 6-hour job timeout.
            # Multi-arch rolldown prebuilds wait for either (a) a coherent
            # crates.io publish so the cargo build doesn't pull the whole
            # rolldown workspace, or (b) cross-compilation via `cross`
            # rather than QEMU userspace. Tracked in STATUS.md "Open TODOs".

      - name: Upload @gjsify/webgl prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-prebuilds-linux-${{ matrix.arch }}
          path: packages/framework/webgl/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/webrtc-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/web/webrtc-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/http-soup-bridge prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http-soup-bridge/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/http2-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http2-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http2-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/lightningcss-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/infra/lightningcss-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

  # ----------------------------------------------------------------
  # Commit all prebuilds back to the repo
  # (only on push to main, not on PRs)
  # ----------------------------------------------------------------
  commit-prebuilds:
    name: Commit prebuilds to repo
    needs: [build-prebuilds, build-prebuilds-qemu]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------- @gjsify/webgl --------
      - name: Download webgl x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-x86_64
          path: packages/framework/webgl/prebuilds/linux-x86_64/

      - name: Download webgl aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-aarch64
          path: packages/framework/webgl/prebuilds/linux-aarch64/

      - name: Download webgl ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-ppc64
          path: packages/framework/webgl/prebuilds/linux-ppc64/

      - name: Download webgl s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-s390x
          path: packages/framework/webgl/prebuilds/linux-s390x/

      - name: Download webgl riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-riscv64
          path: packages/framework/webgl/prebuilds/linux-riscv64/

      # -------- @gjsify/webrtc-native --------
      - name: Download webrtc-native x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-x86_64
          path: packages/web/webrtc-native/prebuilds/linux-x86_64/

      - name: Download webrtc-native aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-aarch64
          path: packages/web/webrtc-native/prebuilds/linux-aarch64/

      - name: Download webrtc-native ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-ppc64
          path: packages/web/webrtc-native/prebuilds/linux-ppc64/

      - name: Download webrtc-native s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-s390x
          path: packages/web/webrtc-native/prebuilds/linux-s390x/

      - name: Download webrtc-native riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-riscv64
          path: packages/web/webrtc-native/prebuilds/linux-riscv64/

      # -------- @gjsify/http-soup-bridge --------
      - name: Download http-soup-bridge x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-x86_64
          path: packages/node/http-soup-bridge/prebuilds/linux-x86_64/

      - name: Download http-soup-bridge aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-aarch64
          path: packages/node/http-soup-bridge/prebuilds/linux-aarch64/

      - name: Download http-soup-bridge ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-ppc64
          path: packages/node/http-soup-bridge/prebuilds/linux-ppc64/

      - name: Download http-soup-bridge s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-s390x
          path: packages/node/http-soup-bridge/prebuilds/linux-s390x/

      - name: Download http-soup-bridge riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-riscv64
          path: packages/node/http-soup-bridge/prebuilds/linux-riscv64/

      # -------- @gjsify/http2-native --------
      - name: Download http2-native x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http2-native-prebuilds-linux-x86_64
          path: packages/node/http2-native/prebuilds/linux-x86_64/

      - name: Download http2-native aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http2-native-prebuilds-linux-aarch64
          path: packages/node/http2-native/prebuilds/linux-aarch64/

      - name: Download http2-native ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http2-native-prebuilds-linux-ppc64
          path: packages/node/http2-native/prebuilds/linux-ppc64/

      - name: Download http2-native s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http2-native-prebuilds-linux-s390x
          path: packages/node/http2-native/prebuilds/linux-s390x/

      - name: Download http2-native riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http2-native-prebuilds-linux-riscv64
          path: packages/node/http2-native/prebuilds/linux-riscv64/

      # -------- @gjsify/lightningcss-native --------
      - name: Download lightningcss-native x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-x86_64
          path: packages/infra/lightningcss-native/prebuilds/linux-x86_64/

      - name: Download lightningcss-native aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-aarch64
          path: packages/infra/lightningcss-native/prebuilds/linux-aarch64/

      - name: Download lightningcss-native ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-ppc64
          path: packages/infra/lightningcss-native/prebuilds/linux-ppc64/

      - name: Download lightningcss-native s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-s390x
          path: packages/infra/lightningcss-native/prebuilds/linux-s390x/

      - name: Download lightningcss-native riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: lightningcss-native-prebuilds-linux-riscv64
          path: packages/infra/lightningcss-native/prebuilds/linux-riscv64/

      # -------- @gjsify/rolldown-native (native runners only) --------
      - name: Download rolldown-native x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: rolldown-native-prebuilds-linux-x86_64
          path: packages/infra/rolldown-native/prebuilds/linux-x86_64/

      - name: Download rolldown-native aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: rolldown-native-prebuilds-linux-aarch64
          path: packages/infra/rolldown-native/prebuilds/linux-aarch64/

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            packages/framework/webgl/prebuilds/ \
            packages/web/webrtc-native/prebuilds/ \
            packages/node/http-soup-bridge/prebuilds/ \
            packages/node/http2-native/prebuilds/ \
            packages/infra/lightningcss-native/prebuilds/ \
            packages/infra/rolldown-native/prebuilds/
          if git diff --cached --quiet; then
            echo "No prebuild changes to commit."
          else
            git commit -m "chore: update native prebuilds [skip ci]"
            git pull --rebase origin main
            git push
          fi
