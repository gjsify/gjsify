name: Build Native Prebuilds

# Run on push to main and on tags, or manually.
# Artifacts are uploaded and can be downloaded to commit into the repo before npm publish.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/framework/webgl/src/vala/**'
      - 'packages/framework/webgl/src/vapi/**'
      - 'packages/framework/webgl/meson.build'
      - 'packages/web/webrtc-native/src/vala/**'
      - 'packages/web/webrtc-native/meson.build'
      - 'packages/node/http-soup-bridge/src/vala/**'
      - 'packages/node/http-soup-bridge/meson.build'
      - '.github/workflows/prebuilds.yml'



jobs:
  # ----------------------------------------------------------------
  # Native runners — x86_64 and aarch64
  # ----------------------------------------------------------------
  build-prebuilds:
    name: Build prebuilds (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    container:
      image: fedora:43

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    steps:
      - name: Install prerequisites
        # gstreamer*-devel packages provide the .pc files for gstreamer-sdp-1.0
        # and gstreamer-webrtc-1.0 that @gjsify/webrtc-native needs at Vala build time.
        # libsoup3-devel is needed by @gjsify/http-soup-bridge for libsoup-3.0.
        run: >
          dnf install -y
          git tar xz findutils
          meson vala gcc pkgconf
          glib2-devel gobject-introspection-devel
          gtk4-devel gdk-pixbuf2-devel
          libepoxy-devel
          gstreamer1-devel
          gstreamer1-plugins-base-devel
          gstreamer1-plugins-bad-free-devel
          libsoup3-devel

      - name: Checkout repository
        uses: actions/checkout@v6

      # -------- @gjsify/webgl (gwebgl) --------
      - name: Build @gjsify/webgl Vala library
        working-directory: packages/framework/webgl
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/webgl prebuilds
        working-directory: packages/framework/webgl
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgwebgl.so build/Gwebgl-0.1.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/webgl prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/webgl prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-prebuilds-linux-${{ matrix.arch }}
          path: packages/framework/webgl/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/webrtc-native (GjsifyWebrtc) --------
      - name: Build @gjsify/webrtc-native Vala library
        working-directory: packages/web/webrtc-native
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/webrtc-native prebuilds
        working-directory: packages/web/webrtc-native
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifywebrtc.so build/GjsifyWebrtc-0.1.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/webrtc-native prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/webrtc-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/web/webrtc-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      # -------- @gjsify/http-soup-bridge (GjsifyHttpSoupBridge) --------
      - name: Build @gjsify/http-soup-bridge Vala library
        working-directory: packages/node/http-soup-bridge
        run: |
          meson setup build .
          meson compile -C build

      - name: Collect @gjsify/http-soup-bridge prebuilds
        working-directory: packages/node/http-soup-bridge
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p "prebuilds/linux-${ARCH}"
          cp build/libgjsifyhttpsoupbridge.so build/GjsifyHttpSoupBridge-1.0.gir build/GjsifyHttpSoupBridge-1.0.typelib "prebuilds/linux-${ARCH}/"
          echo "@gjsify/http-soup-bridge prebuilds for linux-${ARCH}:"
          ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/http-soup-bridge prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http-soup-bridge/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

  # ----------------------------------------------------------------
  # QEMU-emulated builds — ppc64, s390x, riscv64
  #
  # All three run on ubuntu-latest host runners using QEMU binary
  # format emulation via uraimo/run-on-arch-action.
  #
  # ppc64 + s390x: fedora:43 has official images for both → same dnf
  #   package names as the native job above.
  # riscv64: fedora:43 has no riscv64 image → ubuntu:24.04 is used
  #   instead (package names differ; auto-detected via command -v dnf).
  #
  # Node.js process.arch values used as the prebuilds/ dir suffix:
  #   ppc64le (QEMU) → process.arch 'ppc64'  → prebuilds/linux-ppc64/
  #   s390x          → process.arch 's390x'  → prebuilds/linux-s390x/
  #   riscv64        → process.arch 'riscv64'→ prebuilds/linux-riscv64/
  # ----------------------------------------------------------------
  build-prebuilds-qemu:
    name: Build prebuilds (${{ matrix.arch }}) [QEMU]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # IBM POWER9/10 workstations and servers (e.g. Raptor Computing Talos II)
          - arch: ppc64
            qemu_arch: ppc64le
            base_image: fedora:43

          # IBM Z mainframes — enterprise Linux servers
          - arch: s390x
            qemu_arch: s390x
            base_image: fedora:43

          # RISC-V boards (StarFive VisionFive 2, Milk-V Pioneer, SiFive HiFive, …)
          # ubuntu:26.04 is used because fedora:43 has no official riscv64 image.
          - arch: riscv64
            qemu_arch: riscv64
            base_image: ubuntu:26.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build all prebuilds on ${{ matrix.arch }} via QEMU
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: ${{ matrix.qemu_arch }}
          distro: none
          base_image: ${{ matrix.base_image }}
          githubToken: ${{ github.token }}

          # Detect package manager: dnf for Fedora (ppc64/s390x), apt-get for Ubuntu (riscv64).
          install: |
            if command -v dnf > /dev/null 2>&1; then
              dnf install -y \
                git tar xz findutils \
                meson vala gcc pkgconf \
                glib2-devel gobject-introspection-devel \
                gtk4-devel gdk-pixbuf2-devel \
                libepoxy-devel \
                gstreamer1-devel \
                gstreamer1-plugins-base-devel \
                gstreamer1-plugins-bad-free-devel \
                libsoup3-devel
            else
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                git tar xz-utils findutils \
                meson valac gcc pkg-config \
                libglib2.0-dev gobject-introspection libgirepository1.0-dev \
                libgtk-4-dev libgdk-pixbuf-2.0-dev \
                libepoxy-dev \
                libgstreamer1.0-dev \
                libgstreamer-plugins-base1.0-dev \
                libgstreamer-plugins-bad1.0-dev \
                libsoup-3.0-dev
            fi

          run: |
            set -e
            ARCH="${{ matrix.arch }}"

            # -------- @gjsify/webgl --------
            cd packages/framework/webgl
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgwebgl.so build/Gwebgl-0.1.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/webgl prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/webrtc-native --------
            cd packages/web/webrtc-native
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifywebrtc.so build/GjsifyWebrtc-0.1.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/webrtc-native prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"
            cd ../../..

            # -------- @gjsify/http-soup-bridge --------
            cd packages/node/http-soup-bridge
            meson setup build .
            meson compile -C build
            mkdir -p "prebuilds/linux-${ARCH}"
            cp build/libgjsifyhttpsoupbridge.so build/GjsifyHttpSoupBridge-1.0.gir build/GjsifyHttpSoupBridge-1.0.typelib "prebuilds/linux-${ARCH}/"
            echo "@gjsify/http-soup-bridge prebuilds for linux-${ARCH}:"
            ls -lh "prebuilds/linux-${ARCH}/"

      - name: Upload @gjsify/webgl prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webgl-prebuilds-linux-${{ matrix.arch }}
          path: packages/framework/webgl/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/webrtc-native prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-${{ matrix.arch }}
          path: packages/web/webrtc-native/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

      - name: Upload @gjsify/http-soup-bridge prebuilds artifact
        uses: actions/upload-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-${{ matrix.arch }}
          path: packages/node/http-soup-bridge/prebuilds/linux-${{ matrix.arch }}/
          retention-days: 30

  # ----------------------------------------------------------------
  # Commit all prebuilds back to the repo
  # (only on push to main, not on PRs)
  # ----------------------------------------------------------------
  commit-prebuilds:
    name: Commit prebuilds to repo
    needs: [build-prebuilds, build-prebuilds-qemu]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # -------- @gjsify/webgl --------
      - name: Download webgl x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-x86_64
          path: packages/framework/webgl/prebuilds/linux-x86_64/

      - name: Download webgl aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-aarch64
          path: packages/framework/webgl/prebuilds/linux-aarch64/

      - name: Download webgl ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-ppc64
          path: packages/framework/webgl/prebuilds/linux-ppc64/

      - name: Download webgl s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-s390x
          path: packages/framework/webgl/prebuilds/linux-s390x/

      - name: Download webgl riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webgl-prebuilds-linux-riscv64
          path: packages/framework/webgl/prebuilds/linux-riscv64/

      # -------- @gjsify/webrtc-native --------
      - name: Download webrtc-native x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-x86_64
          path: packages/web/webrtc-native/prebuilds/linux-x86_64/

      - name: Download webrtc-native aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-aarch64
          path: packages/web/webrtc-native/prebuilds/linux-aarch64/

      - name: Download webrtc-native ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-ppc64
          path: packages/web/webrtc-native/prebuilds/linux-ppc64/

      - name: Download webrtc-native s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-s390x
          path: packages/web/webrtc-native/prebuilds/linux-s390x/

      - name: Download webrtc-native riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: webrtc-native-prebuilds-linux-riscv64
          path: packages/web/webrtc-native/prebuilds/linux-riscv64/

      # -------- @gjsify/http-soup-bridge --------
      - name: Download http-soup-bridge x86_64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-x86_64
          path: packages/node/http-soup-bridge/prebuilds/linux-x86_64/

      - name: Download http-soup-bridge aarch64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-aarch64
          path: packages/node/http-soup-bridge/prebuilds/linux-aarch64/

      - name: Download http-soup-bridge ppc64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-ppc64
          path: packages/node/http-soup-bridge/prebuilds/linux-ppc64/

      - name: Download http-soup-bridge s390x prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-s390x
          path: packages/node/http-soup-bridge/prebuilds/linux-s390x/

      - name: Download http-soup-bridge riscv64 prebuilds
        uses: actions/download-artifact@v4
        with:
          name: http-soup-bridge-prebuilds-linux-riscv64
          path: packages/node/http-soup-bridge/prebuilds/linux-riscv64/

      - name: Commit prebuilds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/framework/webgl/prebuilds/ packages/web/webrtc-native/prebuilds/ packages/node/http-soup-bridge/prebuilds/
          if git diff --cached --quiet; then
            echo "No prebuild changes to commit."
          else
            git commit -m "chore: update native prebuilds [skip ci]"
            git pull --rebase origin main
            git push
          fi
