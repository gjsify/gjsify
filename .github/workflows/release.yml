# Workflow to automatically publish packages to npm on new releases
name: Release to NPM

on:
  release:
    types: [published]
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to use for commit message'
        required: false
        default: 'manual'

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils meson vala gcc pkgconf gjs glib2-devel gobject-introspection-devel gtk4-devel libsoup3-devel libepoxy-devel gdk-pixbuf2-devel libadwaita-devel blueprint-compiler

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      # Phase D.7d: Node-free install via the committed GJS bundle.
      # Mirrors main.yml — see that workflow for rationale.
      - name: Install dependencies (gjsify install --immutable)
        run: gjs -m packages/infra/cli/dist/cli.gjs.mjs install --immutable

      - name: Build packages
        run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run build

      - name: Build examples
        run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run build:examples

      - name: Publish packages to npm
        run: PATH="$PWD/node_modules/.bin:$PATH" gjsify run npm:publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
        run: |
          echo "Packages successfully published to npm for release ${RELEASE_TAG}"
          echo "Published packages: @gjsify/*"
