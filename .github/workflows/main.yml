name: GJS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        fedora-version: [43, 44]
        include:
          - fedora-version: 43
            gjs-info: "GJS 1.86 / SM 140"
          - fedora-version: 44
            gjs-info: "GJS 1.88 / SM 140"

    name: Fedora ${{ matrix.fedora-version }} (${{ matrix.gjs-info }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora-version }}

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install GJS and GNOME development libraries
        # gstreamer1-{,plugins-base-,plugins-bad-free-}devel provide the
        # gstreamer-1.0 / gstreamer-sdp-1.0 / gstreamer-webrtc-1.0 pkg-config
        # files + headers needed to compile @gjsify/webrtc-native at Vala
        # build time. libnice-gstreamer1 provides the `nice` plugin that
        # webrtcbin needs at runtime for the WebRTC test suite.
        run: >
          dnf install -y
          gjs
          glib2-devel
          gobject-introspection-devel
          gtk4-devel
          libsoup3-devel
          webkitgtk6.0-devel
          libadwaita-devel
          gdk-pixbuf2-devel
          libepoxy-devel
          gstreamer1-devel
          gstreamer1-plugins-base-devel
          gstreamer1-plugins-bad-free-devel
          libnice-gstreamer1
          libgda
          libgda-sqlite
          xorg-x11-server-Xvfb
          mesa-dri-drivers
          mesa-libGL


      - name: Install Meson, Vala and Blueprint Compiler
        run: dnf install -y meson vala gcc pkgconf blueprint-compiler

      - name: Create non-root user for tests
        run: |
          useradd -m testuser
          chown -R testuser:testuser .

      - name: Enable Corepack
        # `yarn` is still on PATH for `yarn run <script>` invocations (the
        # script *implementations* are gjsify-based now but the entrypoints
        # stay `yarn run …` until we ship a script-runner adapter that
        # exposes parity for things like `yarn workspaces foreach … npm
        # publish …`). Corepack provides yarn 4 without needing a system
        # install.
        run: su testuser -c 'corepack enable'

      # Phase D.7c: Node-free bootstrap. The CLI's committed GJS bundle
      # (`packages/infra/cli/dist/cli.gjs.mjs`) installs `node_modules/`
      # directly from `gjsify-lock.json`. No `yarn install`, no `npm
      # install` — only `gjs -m` to run the bundle and the host's GJS to
      # execute it. The functional bundle-freshness check runs after
      # `Build` (which regenerates the bundle); if the committed bundle
      # is out-of-sync with the just-bumped package.json version, that
      # later step will fail with a clear "refresh and commit" error.
      - name: Install NPM dependencies (via gjsify)
        run: su testuser -c 'gjs -m packages/infra/cli/dist/cli.gjs.mjs install --immutable'

      - name: Clear
        run: su testuser -c 'yarn run clear'

      - name: Build
        run: su testuser -c 'yarn run build'

      # The CLI's GJS bundle is committed to enable Node-free bootstrap (Phase D.7b).
      # We can't enforce a byte-exact freshness check — the build is not perfectly
      # cross-environment deterministic (Node patch version + system libs perturb
      # the rolldown output). Instead we run a functional check: the committed
      # bundle must execute under stock GJS AND report the *current* package.json
      # version. That catches both "bundle is broken" and "bundle is from the
      # previous release" without forcing every CI environment to produce
      # byte-identical output.
      - name: Verify committed CLI GJS bundle is functional + up-to-date
        run: |
          set -e
          EXPECTED=$(node -p "require('./packages/infra/cli/package.json').version")
          ACTUAL=$(gjs -m packages/infra/cli/dist/cli.gjs.mjs --version 2>&1 | head -1 | tr -d '[:space:]')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::packages/infra/cli/dist/cli.gjs.mjs reports version '$ACTUAL', package.json says '$EXPECTED'."
            echo "::error::Refresh locally: yarn workspace @gjsify/cli run build && yarn workspace @gjsify/cli run build:gjs-bundle"
            echo "::error::Then commit packages/infra/cli/dist/cli.gjs.mjs."
            exit 1
          fi
          echo "GJS bundle OK — reports v$ACTUAL matching package.json."

      # Root `build` uses --no-private, so private example workspaces are skipped; tests need dist/.
      - name: Build examples
        run: su testuser -c 'yarn run build:examples'

      - name: Check
        run: su testuser -c 'yarn run check'

      - name: Check examples
        run: su testuser -c 'yarn run check:examples'

      - name: Test
        run: su testuser -c 'LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" yarn run test'

      - name: Test WebGL conformance
        run: su testuser -c 'LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" yarn workspace @gjsify/webgl test:conformance'

      - name: Test CLI examples
        run: su testuser -c 'yarn run test:examples'

      - name: Test net examples
        run: su testuser -c 'yarn run test:examples:net'

      - name: E2E tests
        run: su testuser -c 'yarn test:e2e'
