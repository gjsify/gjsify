name: GJS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        fedora-version: [42, 43, 44]
        include:
          - fedora-version: 42
            gjs-info: "GJS 1.84 / SM 128"
          - fedora-version: 43
            gjs-info: "GJS 1.86 / SM 140"
          - fedora-version: 44
            gjs-info: "GJS 1.88 / SM 140"

    name: Fedora ${{ matrix.fedora-version }} (${{ matrix.gjs-info }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora-version }}

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install GJS and GNOME development libraries
        run: >
          dnf install -y
          gjs
          glib2-devel
          gobject-introspection-devel
          gtk4-devel
          libsoup3-devel
          webkitgtk6.0-devel
          libadwaita-devel
          gdk-pixbuf2-devel
          libepoxy-devel
          libgda
          libgda-sqlite
          xorg-x11-server-Xvfb
          mesa-dri-drivers
          mesa-libGL


      - name: Install Meson, Vala and Blueprint Compiler
        run: dnf install -y meson vala gcc pkgconf blueprint-compiler

      - name: Create non-root user for tests
        run: |
          useradd -m testuser
          chown -R testuser:testuser .

      - name: Enable Corepack
        run: su testuser -c 'corepack enable'

      - name: Install NPM dependencies
        run: su testuser -c 'yarn install --immutable'

      - name: Clear
        run: su testuser -c 'yarn run clear'

      - name: Build
        run: su testuser -c 'yarn run build'

      # Root `build` uses --no-private, so private example workspaces are skipped; tests need dist/.
      - name: Build examples
        run: su testuser -c 'yarn run build:examples'

      - name: Check
        run: su testuser -c 'yarn run check'

      - name: Check examples
        run: su testuser -c 'yarn run check:examples'

      - name: Test
        run: su testuser -c 'LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" yarn run test'

      - name: Test WebGL conformance
        run: su testuser -c 'LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" yarn workspace @gjsify/webgl test:conformance'

      - name: Test CLI examples
        run: su testuser -c 'yarn run test:examples'

      - name: Test net examples
        run: su testuser -c 'yarn run test:examples:net'

      - name: E2E tests
        run: su testuser -c 'yarn test:e2e'
