name: GJS
on:
  pull_request:
  push:

jobs:
  linux:
    strategy:
      matrix:
        node-version: [ 24.x ]
        deno-version: [ vx.x.x ]
        os:
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: ${{ matrix.deno-version }}
      - run: sudo apt-get update
      - name: Install Gjs, Gtk and more...
        run: sudo apt-get --yes install gjs gir1.2-glib-2.0 gir1.2-giounix-2.0 libgda-5.0-dev libgirepository-1.0-dev libgtk-4-dev libsoup-3.0-dev libwebkitgtk-6.0-dev libadwaita-1-dev
      - name: Install meson and valac
        run: sudo apt-get --yes install meson valac
      - name: Install NPM dependencies
        run: yarn install --immutable
      - name: Build
        run: yarn run build
      - name: Check
        run: yarn run check
      - name: Test
        run: yarn run test