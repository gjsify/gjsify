name: GJS

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        fedora-version: [43, 44]
        include:
          - fedora-version: 43
            gjs-info: "GJS 1.86 / SM 140"
          - fedora-version: 44
            gjs-info: "GJS 1.88 / SM 140"

    name: Fedora ${{ matrix.fedora-version }} (${{ matrix.gjs-info }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora-version }}

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install GJS and GNOME development libraries
        # gstreamer1-{,plugins-base-,plugins-bad-free-}devel provide the
        # gstreamer-1.0 / gstreamer-sdp-1.0 / gstreamer-webrtc-1.0 pkg-config
        # files + headers needed to compile @gjsify/webrtc-native at Vala
        # build time. libnice-gstreamer1 provides the `nice` plugin that
        # webrtcbin needs at runtime for the WebRTC test suite.
        run: >
          dnf install -y
          gjs
          glib2-devel
          gobject-introspection-devel
          gtk4-devel
          libsoup3-devel
          webkitgtk6.0-devel
          libadwaita-devel
          gdk-pixbuf2-devel
          libepoxy-devel
          gstreamer1-devel
          gstreamer1-plugins-base-devel
          gstreamer1-plugins-bad-free-devel
          libnice-gstreamer1
          libgda
          libgda-sqlite
          xorg-x11-server-Xvfb
          mesa-dri-drivers
          mesa-libGL


      - name: Install Meson, Vala and Blueprint Compiler
        run: dnf install -y meson vala gcc pkgconf blueprint-compiler

      - name: Create non-root user for tests
        run: |
          useradd -m testuser
          chown -R testuser:testuser .

      # Phase D.7d: Node-free install. The committed GJS bundle
      # (`packages/infra/cli/dist/cli.gjs.mjs`) consumes
      # `gjsify-lock.json` and materialises `node_modules/` (incl.
      # workspace `.bin/` shims so `npm run …` finds `gjsify` on PATH).
      # No yarn anywhere in the bootstrap.
      - name: Install dependencies (gjsify install --immutable)
        run: su testuser -c 'gjs -m packages/infra/cli/dist/cli.gjs.mjs install --immutable'

      # The CLI's GJS bundle is committed to enable Node-free bootstrap (Phase D.7b).
      # We can't enforce a byte-exact freshness check — the build is not perfectly
      # cross-environment deterministic (Node patch version + system libs perturb
      # the rolldown output). Instead we run a functional check: the committed
      # bundle must execute under stock GJS AND report the *current* package.json
      # version. That catches both "bundle is broken" and "bundle is from the
      # previous release" without forcing every CI environment to produce
      # byte-identical output.
      #
      # MUST run BEFORE the Build step — `npm run build` rebuilds
      # `dist/cli.gjs.mjs`, overwriting the committed copy with one assembled
      # from the just-installed node_modules layout. Verifying after a rebuild
      # would test the rebuilt bundle (not the committed one), defeating the
      # purpose of the freshness check.
      - name: Verify committed CLI GJS bundle is functional + up-to-date
        run: |
          set -e
          EXPECTED=$(node -p "require('./packages/infra/cli/package.json').version")
          ACTUAL=$(gjs -m packages/infra/cli/dist/cli.gjs.mjs --version 2>&1 | head -1 | tr -d '[:space:]')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::packages/infra/cli/dist/cli.gjs.mjs reports version '$ACTUAL', package.json says '$EXPECTED'."
            echo "::error::Refresh locally: gjsify workspace @gjsify/cli build && gjsify workspace @gjsify/cli build:gjs-bundle"
            echo "::error::Then commit packages/infra/cli/dist/cli.gjs.mjs."
            exit 1
          fi
          echo "GJS bundle OK — reports v$ACTUAL matching package.json."

      - name: Build
        run: su testuser -c 'npm run build'

      # Root `build` uses --no-private, so private example workspaces are skipped; tests need dist/.
      - name: Build examples
        run: su testuser -c 'npm run build:examples'

      - name: Check
        run: su testuser -c 'npm run check'

      - name: Check examples
        run: su testuser -c 'npm run check:examples'

      - name: Test
        run: su testuser -c 'LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" npm run test'

      - name: Test WebGL conformance
        # `gjsify` is at `node_modules/.bin/gjsify` after install. xvfb-run
        # spawns a clean shell that doesn't inherit the PATH npm would
        # prepend, so prepend it explicitly here.
        run: su testuser -c 'PATH="$PWD/node_modules/.bin:$PATH" LIBGL_ALWAYS_SOFTWARE=1 xvfb-run -a --server-args="-screen 0 1280x720x24" gjsify workspace @gjsify/webgl test:conformance'

      - name: Test CLI examples
        run: su testuser -c 'npm run test:examples'

      - name: Test net examples
        run: su testuser -c 'npm run test:examples:net'

      - name: E2E tests
        run: su testuser -c 'npm run test:e2e'
