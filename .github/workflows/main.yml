name: GJS

on:
  pull_request:
  push:

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        node-version: [24.x]
        fedora-version: [42, 43]
        include:
          - fedora-version: 42
            gjs-info: "GJS 1.84 / SM 128"
          - fedora-version: 43
            gjs-info: "GJS 1.86 / SM 140"

    name: Fedora ${{ matrix.fedora-version }} (${{ matrix.gjs-info }})
    runs-on: ubuntu-latest
    container:
      image: fedora:${{ matrix.fedora-version }}

    steps:
      - name: Install container prerequisites
        run: dnf install -y git tar xz findutils

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install GJS and GNOME development libraries
        run: >
          dnf install -y
          gjs
          glib2-devel
          gobject-introspection-devel
          gtk4-devel
          libsoup3-devel
          webkitgtk6.0-devel
          libadwaita-devel
          gdk-pixbuf2-devel
          libepoxy-devel

      - name: Install Meson and Vala
        run: dnf install -y meson vala gcc pkgconf

      - name: Enable Corepack
        run: corepack enable

      - name: Install NPM dependencies
        run: yarn install --immutable

      - name: Clear
        run: yarn run clear

      - name: Build
        run: yarn run build

      # Root `build` uses --no-private, so private example workspaces are skipped; tests need dist/.
      - name: Build examples
        run: yarn run build:examples

      - name: Check
        run: yarn run check

      - name: Check examples
        run: yarn run check:examples

      - name: Test
        run: yarn run test

      - name: Test CLI examples
        run: yarn run test:examples
