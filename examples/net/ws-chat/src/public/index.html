<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gjsify WebSocket Chat</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>gjsify WebSocket Chat</h1>
    <p id="status">Connecting...</p>
    <div id="messages"></div>
    <form id="chat-form">
      <input type="text" id="user" placeholder="Your name" value="User" />
      <input type="text" id="text" placeholder="Type a message..." autofocus />
      <button type="submit">Send</button>
    </form>
  </main>
  <script>
    const messagesDiv = document.getElementById('messages');
    const statusEl = document.getElementById('status');
    const form = document.getElementById('chat-form');
    const userInput = document.getElementById('user');
    const textInput = document.getElementById('text');

    function addMessage(msg) {
      const el = document.createElement('div');
      el.className = 'message';
      const time = new Date(msg.time).toLocaleTimeString();
      const timeSpan = document.createElement('span');
      timeSpan.className = 'time';
      timeSpan.textContent = time + ' ';
      const nameSpan = document.createElement('strong');
      nameSpan.textContent = msg.user + ': ';
      el.appendChild(timeSpan);
      el.appendChild(nameSpan);
      el.appendChild(document.createTextNode(msg.text));
      messagesDiv.appendChild(el);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Try WebSocket first, fall back to polling
    const wsUrl = 'ws://' + location.host + '/ws';
    let ws;
    try {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => { statusEl.textContent = 'Connected (WebSocket)'; };
      ws.onclose = () => { statusEl.textContent = 'Disconnected'; };
      ws.onerror = () => { statusEl.textContent = 'WebSocket error — using REST fallback'; ws = null; };
      ws.onmessage = (event) => { addMessage(JSON.parse(event.data)); };
    } catch (e) {
      statusEl.textContent = 'WebSocket not available — using REST';
      ws = null;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = textInput.value.trim();
      if (!text) return;
      textInput.value = '';
      const payload = JSON.stringify({ user: userInput.value || 'Anonymous', text });

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(payload);
      } else {
        await fetch('/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: payload,
        });
      }
    });
  </script>
</body>
</html>
