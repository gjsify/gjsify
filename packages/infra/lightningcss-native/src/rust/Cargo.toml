[package]
name = "gjsify_lightningcss"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
lightningcss = { version = "1.0.0-alpha.71", features = ["browserslist"] }
parcel_sourcemap = { version = "2.1.1", features = ["json"] }
browserslist-rs = { version = "0.19.0" }

[profile.release]
lto = true
codegen-units = 1
strip = true
